<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Everyone Active Booking Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #10b981;
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 2rem;
            position: relative;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, var(--primary) 0%, transparent 70%);
            opacity: 0.15;
            z-index: -1;
            filter: blur(40px);
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            font-weight: 400;
            color: var(--text-muted);
        }

        input[type="date"],
        input[type="time"] {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background-color: rgba(15, 23, 42, 0.5);
            color: var(--text);
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--primary) 0%, #a855f7 100%);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            margin-top: 1rem;
        }

        button:hover {
            opacity: 0.9;
            transform: scale(0.98);
        }

        button:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
            opacity: 0.5;
        }

        .status-container {
            margin-top: 2rem;
            padding: 1rem;
            border-radius: 12px;
            font-size: 0.9rem;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .status-loading {
            display: block;
            border-left: 4px solid var(--primary);
            background-color: rgba(99, 102, 241, 0.1);
            color: var(--primary);
        }

        .status-success {
            display: block;
            border-left: 4px solid var(--accent);
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--accent);
        }

        .status-error {
            display: block;
            border-left: 4px solid var(--error);
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--error);
        }

        .loader {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid currentColor;
            border-right-color: transparent;
            border-radius: 50%;
            animation: rotate 0.75s linear infinite;
            margin-right: 8px;
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .log-box {
            margin-top: 1rem;
            padding: 0.5rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            font-family: monospace;
            max-height: 150px;
            overflow-y: auto;
            font-size: 0.8rem;
            color: #cbd5e1;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <h1>Booking Test</h1>
            <p class="subtitle">Manual trigger for Badminton at Stevenage Arts & L C</p>

            <div class="form-group">
                <label for="targetDate">Target Date</label>
                <input type="date" id="targetDate">
            </div>

            <div class="form-group">
                <label for="targetTime">Target Time</label>
                <input type="time" id="targetTime" value="21:30">
            </div>

            <button id="bookBtn" onclick="triggerBooking()">
                Start Booking Process
            </button>

            <div id="status" class="status-container">
                <span id="statusIcon"></span>
                <span id="statusText"></span>
                <div id="logBox" class="log-box" style="display: none;"></div>
            </div>
        </div>
    </div>

    <script>
        // Set default date to tomorrow
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        document.getElementById('targetDate').value = tomorrow.toISOString().split('T')[0];

        async function triggerBooking() {
            const btn = document.getElementById('bookBtn');
            const status = document.getElementById('status');
            const statusText = document.getElementById('statusText');
            const statusIcon = document.getElementById('statusIcon');
            const logBox = document.getElementById('logBox');

            const dateInput = document.getElementById('targetDate').value;
            const timeInput = document.getElementById('targetTime').value;

            // Format date to DD/MM/YYYY
            const dateParts = dateInput.split('-');
            const formattedDate = `${dateParts[2]}/${dateParts[1]}/${dateParts[0]}`;

            btn.disabled = true;
            status.className = 'status-container status-loading';
            statusIcon.className = 'loader';
            statusText.innerText = 'Processing booking... please wait up to 2 minutes.';
            logBox.style.display = 'none';

            try {
                const response = await fetch('/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        query: `Book Badminton for ${formattedDate} at ${timeInput}.`
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    status.className = 'status-container status-success';
                    statusIcon.className = '';
                    statusIcon.innerHTML = '✓ ';
                    statusText.innerText = 'Booking process complete.';
                    logBox.innerText = data.response;
                    logBox.style.display = 'block';
                } else {
                    throw new Error(data.error || 'Server error');
                }
            } catch (err) {
                status.className = 'status-container status-error';
                statusIcon.className = '';
                statusIcon.innerHTML = '✕ ';
                statusText.innerText = 'Error: ' + err.message;
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>

</html>

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: search-agent-service
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    spec:
      containers:
      - image: us-central1-docker.pkg.dev/coolpics-hosting/my-repo/search-agent
        ports:
        - containerPort: 8080

        resources:
          limits:
            cpu: 1000m
            memory: 2Gi # Playwright/Chromium needs more memory
